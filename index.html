<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company - Landscape Designer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.97); }
            to { opacity: 1; transform: scale(1); }
        }

        .animate-fade-in-up {
            opacity: 0;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-fade-in {
            opacity: 0;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-scale-in {
            opacity: 0;
            animation: scaleIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .delay-0 { animation-delay: 0ms; }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
        .delay-500 { animation-delay: 500ms; }

        .text-balance { text-wrap: balance; }
        .text-pretty { text-wrap: pretty; }

        @media (prefers-reduced-motion: reduce) {
            .animate-fade-in-up, .animate-fade-in, .animate-scale-in {
                animation: none;
                opacity: 1;
                transform: none;
            }
        }

        .font-display-italic {
            font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
            font-style: italic;
            font-weight: 400;
            letter-spacing: 0em;
        }
    </style>
</head>
<body class="bg-[#0a2520] text-[#e2eed8] font-sans antialiased min-h-screen overflow-x-hidden selection:bg-[#e2eed8] selection:text-[#0a2520]">

    <!-- Navigation -->
    <nav class="w-full px-12 py-8 flex justify-between items-center text-[12px] animate-fade-in delay-0">
        <div class="w-1/3 text-[#e2eed8]/70 tracking-wide">
            Landscape and Garden Designer
        </div>
        <div class="w-1/3 text-center text-[15px] tracking-wide">
            Company
        </div>
        <div class="w-1/3 flex justify-end">
            <a href="#" class="flex items-center gap-1 hover:opacity-70 transition-opacity duration-200 text-[#e2eed8]/70 tracking-wide">
                Instagram <span class="text-[14px] leading-none mb-[2px]">&#8599;</span>
            </a>
        </div>
    </nav>

    <!-- Subtle Divider -->
    <div class="mx-12 border-b border-[#e2eed8]/10 animate-fade-in delay-0"></div>

    <!-- Hero Content -->
    <main class="w-full mx-auto px-12 pt-24 pb-24 flex flex-col items-center">

        <!-- Headline -->
        <h1 class="text-[4.5rem] md:text-[7.5rem] leading-[1.05] tracking-[-0.02em] text-center mb-32 animate-fade-in-up delay-100 w-full">Complete Global Talent Intelligence for Executive Search</h1>

        <!-- Lower Grid Section -->
        <div class="w-full grid grid-cols-12 gap-8 relative">

            <!-- Left Image Column -->
            <div class="col-span-4 animate-scale-in delay-300">
                <img src="https://imolwncbqxugevwmleed.supabase.co/storage/v1/object/public/public-assets/hero-images/d1c6479a-6ddc-4762-adb7-7f9c7f7e9a88/hero-2-img-0-1774356663662.png" alt="Landscape Design Project" class="w-full h-[650px] object-cover bg-gray-200" />
            </div>

            <!-- Center Content Column -->
            <div class="col-span-4 flex flex-col items-center pt-2 animate-fade-in-up delay-200">
                <span class="text-[10px] font-bold tracking-[0.15em] uppercase text-[#e2eed8]">(FEATURED WORK)</span>
                
                <!-- Decorative Dark Pill -->
                <div class="w-48 h-12 bg-[#10302a] rounded-full mt-64 animate-fade-in-up delay-400"></div>
            </div>

            <!-- Right Content Column -->
            <div class="col-span-4 flex flex-col pt-2 animate-fade-in-up delay-300">
                <p class="text-[15px] leading-relaxed text-pretty max-w-[280px] text-[#e2eed8]/80">Map 100% of your target talent market with deep intelligence analysis and automated global mapping for critical C-suite placements.</p>
                
                <div class="mt-40 animate-scale-in delay-500">
                    <img src="https://imolwncbqxugevwmleed.supabase.co/storage/v1/object/public/public-assets/hero-images/d1c6479a-6ddc-4762-adb7-7f9c7f7e9a88/hero-2-img-1-1774356663169.png" alt="Garden Detail View" class="w-full h-[400px] object-cover bg-gray-200" />
                </div>
            </div>

        </div>

    </main>

</body>
</html>
